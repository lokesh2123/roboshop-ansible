- name: configuring the mysql server
  hosts: mysql
  become: yes

  tasks:
  - name: Install MySQL Server
    package:
      name: mysql-server
      state: present
  
  - name: start and enable the mysql server
    service:
      name: mysqld
      state: started
      enabled: true

  - name: set the username and password for the mysql server 
    command: mysql_secure_installation --set-root-pass RoboShop@1