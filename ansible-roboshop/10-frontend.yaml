- name: configuring the frontend
  hosts: frontend
  become: yes

  tasks:
  - name: list the nginx module
    command: dnf module list nginx

  - name: enable the nginx 
    command: dnf module enable nginx:1.24 -y

  - name: install the nginx
    package:
      name: nginx
      state: present

  - name: remove the default content file
    file:
      name: /usr/share/nginx/html/
      state: absent

  - name: remove the frontend.zip
    file:
      name: /tmp/frontend.zip
      state: absent

  - name: create the  html directory
    file:
      name: /usr/share/nginx/html/
      state: directory

  - name: download the application code 
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/frontend.zip

  - name: unarchive the downloaded file
    unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html/
      remote_src: yes

  - name: remove the nginx default conf
    file:
      path: /etc/nginx/nginx.conf
      state: absent

  - name: copy the nginx config 
    template:
      src: nginx.conf.j2
      dest: /etc/nginx/nginx.conf

  - name: restart and enable frontend
    service: 
      name: nginx
      state: restarted
      enabled: yes