- name: configuring the payment service
  hosts: payment
  become: yes

  tasks:
  - name: install the python package
    package:
      name: "{{ item }}"
      state: present
    loop:
      - python
      - gcc
      - python3-devel

  - name: creating the system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"

  - name: delete app directory 
    file:
      path: /app
      state: absent

  - name: delete unzip file 
    file:
      path: /payment.zip
      state: absent

  - name: create the app directory 
    file:
      path: /app
      state: directory

  - name: download the application code 
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: unarchive the downloaded file
    unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  
  - name: install dependencies
    pip: 
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy the payment service
    template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service

  - name: load the daemon service
    systemd_service:
      name: user 
      daemon_reload: true
  
  - name: enable and start the payment service
    service:
      name: payment
      enabled: yes
      state: started
  